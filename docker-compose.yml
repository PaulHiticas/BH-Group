services:
  postgres:
    image: postgres:16-alpine
    container_name: bhgroup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bhgroup_pms}
      POSTGRES_USER: ${POSTGRES_USER:-bhgroup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bhgroup} -d ${POSTGRES_DB:-bhgroup_pms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bhgroup-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhgroup-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bhgroup_pms}
      DB_USERNAME: ${POSTGRES_USER:-bhgroup}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-strong-password}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      APP_NAME: ${APP_NAME:-BH Group PMS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      UPLOAD_DIR: /data/uploads
      UPLOAD_PUBLIC_BASE_URL: ${UPLOAD_PUBLIC_BASE_URL:-http://localhost:8080/uploads}
    volumes:
      - uploads:/data/uploads
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - bhgroup-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: bhgroup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - bhgroup-network

networks:
  bhgroup-network:
    driver: bridge

volumes:
  pgdata:
  uploads:
