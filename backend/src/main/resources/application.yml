spring:
  application:
    name: bhgroup-pms

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bhgroup_pms}
    username: ${DB_USERNAME:bhgroup}
    password: ${DB_PASSWORD:bhgroup}
    hikari:
      pool-name: bhgroup-hikari
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${BACKEND_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  show-actuator: false

app:
  name: ${APP_NAME:BH Group PMS}
  base-url: ${APP_BASE_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@bhgroup.io}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-please-replace-me-1234567890}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    issuer: bhgroup-pms
  security:
    email-verification-token-expiration-minutes: 1440
    password-reset-token-expiration-minutes: 60
    max-login-attempts: 5
    login-lockout-minutes: 15
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080/uploads}
